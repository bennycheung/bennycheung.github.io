<!-- Cat Dialog Bubble with Interactive Chat -->
<style>
#cat-hover-zone {
  position: fixed;
  bottom: 80px;
  right: 0;
  width: 150px;
  height: 220px;
  z-index: 9998;
  cursor: pointer;
}

#cat-speech-bubble {
  position: fixed;
  bottom: 200px;
  right: 10px;
  max-width: 260px;
  min-width: 220px;
  padding: 12px 15px;
  background: #fff;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
  font-size: 13px;
  line-height: 1.5;
  color: #333;
  z-index: 9999;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
}

#cat-speech-bubble a {
  color: #007bff;
  text-decoration: underline;
  font-weight: 500;
}

#cat-speech-bubble a:hover {
  color: #0056b3;
}

html.dark-mode #cat-speech-bubble a {
  color: #6db3f2;
}

html.dark-mode #cat-speech-bubble a:hover {
  color: #9ccfff;
}

#cat-speech-bubble.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* Speech bubble tail */
#cat-speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -10px;
  right: 50px;
  border: 10px solid transparent;
  border-top-color: #fff;
  border-bottom: 0;
}

/* Dark mode support */
html.dark-mode #cat-speech-bubble {
  background: #1f2940;
  color: #e0e0e0;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

html.dark-mode #cat-speech-bubble::after {
  border-top-color: #1f2940;
}

/* Chat message area */
#cat-message {
  margin-bottom: 10px;
  min-height: 20px;
}

/* Chat input container */
#cat-chat-input-container {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  border-top: 1px solid rgba(128,128,128,0.2);
  padding-top: 10px;
}

#cat-chat-input {
  flex: 1;
  padding: 6px 10px;
  border: 1px solid #ddd;
  border-radius: 15px;
  font-size: 12px;
  outline: none;
  background: #f9f9f9;
  color: #333;
}

#cat-chat-input:focus {
  border-color: #007bff;
  background: #fff;
}

#cat-chat-input::placeholder {
  color: #999;
}

html.dark-mode #cat-chat-input {
  background: #2a3654;
  border-color: #3d4f6f;
  color: #e0e0e0;
}

html.dark-mode #cat-chat-input:focus {
  border-color: #6db3f2;
  background: #1f2940;
}

html.dark-mode #cat-chat-input::placeholder {
  color: #8899aa;
}

#cat-chat-send {
  padding: 6px 12px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 15px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.2s;
}

#cat-chat-send:hover {
  background: #0056b3;
}

#cat-chat-send:disabled {
  background: #ccc;
  cursor: not-allowed;
}

html.dark-mode #cat-chat-send {
  background: #4a90d9;
}

html.dark-mode #cat-chat-send:hover {
  background: #6db3f2;
}

html.dark-mode #cat-chat-send:disabled {
  background: #3d4f6f;
}

/* Loading animation */
.cat-loading {
  display: inline-block;
}

.cat-loading::after {
  content: '...';
  animation: catDots 1.5s infinite;
}

@keyframes catDots {
  0%, 20% { content: '.'; }
  40% { content: '..'; }
  60%, 100% { content: '...'; }
}

/* Conversation history */
.cat-history-item {
  font-size: 11px;
  color: #666;
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px dashed rgba(128,128,128,0.2);
}

.cat-history-item:last-child {
  border-bottom: none;
}

.cat-history-user {
  color: #007bff;
  font-weight: 500;
}

html.dark-mode .cat-history-item {
  color: #aaa;
}

html.dark-mode .cat-history-user {
  color: #6db3f2;
}

/* Hide cat dialog on mobile */
@media (max-width: 768px) {
  #cat-hover-zone,
  #cat-speech-bubble {
    display: none !important;
  }
}
</style>

<div id="cat-hover-zone"></div>
<div id="cat-speech-bubble" role="status" aria-live="polite" aria-label="Hijiki the cat says">
  <div id="cat-message"></div>
  <div id="cat-chat-input-container">
    <input type="text" id="cat-chat-input" placeholder="Ask me anything..." maxlength="200" autocomplete="off">
    <button id="cat-chat-send" aria-label="Send message">Ask</button>
  </div>
</div>

<script>
(function() {
  // Configuration
  var CAT_API_URL = 'https://blog-cat-api.btscheung.workers.dev/chat';
  var MAX_HISTORY = 4; // Keep last 2 exchanges

  // Static fallback messages
  var catMessages = [
    // Blog facts
    "This blog explores AI, spatial reasoning, and knowledge systems since 2016! 🧠",
    "Fun fact: Benny trained custom AI models using <a href='/personal-fine-tuning-with-flux'>FLUX fine-tuning</a>!",
    "The <a href='/game-architecture-card-ai-1'>'Race for the Galaxy' AI</a> used neural networks back in 2009 - before AlphaGo! 🎮",
    "This blog covers 115+ posts on AI, deep learning, and computer vision!",
    "Benny's master's thesis was on AI expert systems and <a href='/spatial-reasoning-explained'>spatial reasoning</a>! 🎓",
    "Explore topics from <a href='/using-prolog-to-solve-logic-puzzles'>Prolog logic programming</a> to <a href='/lean-ai-reduce-llm-cost'>GenAI cost optimization</a>!",
    "The blog bridges theory and practice - philosophy to hands-on projects! 🔬",
    "NEW! <a href='/rise-of-ai-powered-super-individual'>Rise of the Super-Individual</a> - AI amplifying human potential! 🚀",
    "Learn about <a href='/identity-for-attribute-based-encryption'>Attribute-Based Encryption</a> for healthcare blockchains! 🏥",
    "Explore the <a href='/intelligence-age-how-to-thrive'>Intelligence Age</a> - what comes after the information age! 💡",
    "The <a href='/q-star-new-method-in-problem-solving'>Q* proposal</a> explores A* algorithm meets Q-learning! 🤖",
    "<a href='/solving-puzzles-using-clp'>Constraint Logic Programming</a> with Prolog's clp(fd) module! 🧩",
    "<a href='/bmad-v6-intellectual-ecosystem'>BMAD v6</a> - agent personas for structured software development! 🧙",
    "<a href='/exploring-llms-on-universal-intelligence'>Marvin Minsky's 1985 insights</a> on universal intelligence explored here!",

    // Series highlights
    "Explore the <a href='/series/'>post series</a> for deep-dive multi-part articles! 📚",
    "NEW! The <a href='/from-yolo-v2-to-yolo11-food-detection-evolution'>FoodInsight</a> series - edge AI food monitoring in 3 parts! 🍕",
    "The <a href='/bmad-reclaiming-control-in-ai-dev'>Applied BMAD</a> series covers AI-driven development in 4 parts!",
    "Check out the <a href='/game-architecture-card-ai-1'>Game Architecture</a> series - 4 parts from neural networks to ontology! 🎮",
    "The <a href='/using-prolog-to-solve-logic-puzzles'>Logic Puzzles</a> series spans 8 years of Prolog and visual logic! 🧩",
    "Dive into <a href='/spatial-reasoning-explained'>Spatial Reasoning</a> - a 4-part journey to AGI foundations! 🧠",
    "The <a href='/identity-for-attribute-based-encryption'>Blockchain Healthcare</a> series explores identity and encryption! 🏥",
    "Love miniatures? The <a href='/journey-of-building-scale-model-dioramas'>Building Scale Model</a> series shows the process! 🎨",
    "The <a href='/q-star-new-method-in-problem-solving'>Philosophy of AI</a> series - 5 parts on intelligence and the future! 🤔",
    "9 curated series await you - visit the <a href='/series/'>Series page</a> to explore!",

    // Navigation tips
    "Try the dark mode toggle in the header! 🌙",
    "Check out Related Posts at the end of each article!",
    "Use the Table of Contents to jump to sections! 📑",
    "Click any image to see it full-size! 🔍",
    "Share posts easily with the Twitter and LinkedIn buttons!",
    "Browse by tag to find related content! 🏷️",
    "The Archives page shows all posts organized by year! 📅",
    "Click the Previous/Next cards to navigate between posts!",
    "Check out the <a href='/tags/'>interactive word cloud</a> on the Tags page! ☁️",
    "The word cloud shows popular topics - bigger means more posts! 🏷️",
    "Click any tag in the word cloud to explore related articles!",
    "Popular Topics on the Home page shows what Benny writes about most! ✨",

    // Newsletter
    "NEW! Subscribe to the newsletter - never miss a post! 📬 Scroll down to sign up!",
    "Want more AI insights? Join the newsletter at the bottom of the page! 💌",
    "Psst! Subscribe below to get notified when Benny publishes new articles! 🐱",
    "Discover the computational beauty of AI - subscribe to stay in the loop! ✨",
    "Join fellow AI enthusiasts! Newsletter signup is at the bottom of every page! 📧",
    "*whispers* The newsletter is free and spam-free! Check the footer! 😸",

    // Post teasers
    "NEW! <a href='/foodinsight-edge-ai-food-monitoring'>FoodInsight</a> - edge AI food monitoring with YOLO11 on Raspberry Pi! 🍕",
    "NEW! <a href='/journey-of-ai-led-foodinsight-development-with-bmad'>AI-Led Development</a> - BMAD agents built an entire system! 🤖",
    "NEW! <a href='/from-yolo-v2-to-yolo11-food-detection-evolution'>YOLO Evolution</a> - from v2 to YOLO11 for food detection! 📈",
    "NEW! <a href='/mindmap-digitization-workflow'>Mind Map Digitization</a> - transform hand-drawn maps with AI! 🧠",
    "NEW! <a href='/process-philosophy-for-ai-agent-design'>Process Philosophy</a> meets AI agent design - Whitehead's insights! 🔮",
    "<a href='/abstraction-of-thought-makes-ai-better-reasoners'>Abstraction of Thought</a> - how thinking about thinking improves AI! 💭",
    "<a href='/harmonizing-two-ai-agent-systems'>Harmonizing AI Systems</a> - bridging PAI and BMAD frameworks! 🌉",
    "<a href='/ontology-making-software-archaeology-has-a-brain'>Software Archaeology</a> gets a brain with ontology reasoning! 🏛️",
    "Explore <a href='/spatial-reasoning-in-agi'>spatial reasoning</a> - the key to AGI beyond LLMs!",
    "Discover the <a href='/dify-your-weekend-genai-magics'>Dify platform</a> for hands-on GenAI learning!",
    "<a href='/lean-ai-reduce-llm-cost'>Lean AI</a> - managing LLM costs for GenAI startups! 💰",
    "<a href='/seeing-logic-with-existential-graphs'>Existential Graphs</a> - visual logic from Peirce's brilliant mind! 🔵",

    // Consulting & GameGrammar
    "Need AI consulting? Visit <a href='https://dynamindresearch.com' target='_blank'>Dynamind Research</a>! 💼",
    "Benny offers AI strategy & software architecture consulting at <a href='https://dynamindresearch.com' target='_blank'>Dynamind Research</a>! 🚀",
    "Try <a href='https://gamegrammar.dynamindresearch.com' target='_blank'>GameGrammar</a> - design board games with 6 AI agents in 60 seconds! 🎲",
    "Building AI products? <a href='https://dynamindresearch.com/#contact' target='_blank'>Contact Benny</a> for consulting! 🤝",
    "GameGrammar uses multi-agent AI to design complete board games! <a href='https://gamegrammar.dynamindresearch.com' target='_blank'>Try it free</a>! 🎮",
    "From blog reader to client? <a href='https://dynamindresearch.com' target='_blank'>Dynamind Research</a> helps organizations navigate AI! 💡",
    "NEW! <a href='/gamegrammar-the-theory-of-generative-board-game-design'>Theory of Generative Design</a> - the philosophy behind GameGrammar! 🎲",
    "NEW! <a href='/nova-the-ai-co-designer-that-learns-your-taste'>Meet Nova</a> - an AI co-designer that learns your taste and remembers your decisions! 🤖",
    "NEW! <a href='/generative-ontology-from-game-knowledge-to-game-creation'>Generative Ontology</a> - when game knowledge becomes a creative engine! 🧠",
    "The GameGrammar series: 4 posts from <a href='/introducing-gamegrammar-ai-powered-board-game-design'>introduction</a> to <a href='/generative-ontology-from-game-knowledge-to-game-creation'>generative ontology</a>! 🎮",

    // Fun messages
    "Meow! Welcome to Benny's Mind Hack! 🐱",
    "*purrs* Thanks for visiting!",
    "I'm Hijiki, your friendly blog guide! 😸",
    "Hover over me anytime for tips and facts!",
    "Happy reading! Let me know if you need anything! 📖",
    "*stretches* Another curious reader! Welcome! 🐾",
    "Did you know cats love AI too? Well, this one does! 😺",
    "Click me again for another random fact!",
    "You've discovered the secret cat assistant! 🎉"
  ];

  // State
  var lastMessageIndex = -1;
  var hideTimeout;
  var conversationHistory = [];
  var isLoading = false;
  var chatMode = false;

  // DOM elements
  var bubble = document.getElementById('cat-speech-bubble');
  var hoverZone = document.getElementById('cat-hover-zone');
  var messageEl = document.getElementById('cat-message');
  var inputEl = document.getElementById('cat-chat-input');
  var sendBtn = document.getElementById('cat-chat-send');

  // Get current page context for the AI
  function getPageContext() {
    var title = document.title || '';
    var excerpt = '';
    var url = window.location.pathname;

    // Try to get post excerpt
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) {
      excerpt = metaDesc.getAttribute('content') || '';
    }

    // Fallback to first paragraph
    if (!excerpt) {
      var firstP = document.querySelector('article p, .post-content p, main p');
      if (firstP) {
        excerpt = firstP.textContent.slice(0, 400);
      }
    }

    return { title: title, excerpt: excerpt, url: url };
  }

  function getRandomMessage() {
    var index;
    do {
      index = Math.floor(Math.random() * catMessages.length);
    } while (index === lastMessageIndex && catMessages.length > 1);
    lastMessageIndex = index;
    return catMessages[index];
  }

  function showMessage(html, keepInput) {
    messageEl.innerHTML = html;
    if (!keepInput) {
      chatMode = false;
    }
  }

  function showBubble(message) {
    clearTimeout(hideTimeout);
    if (message) {
      showMessage(message);
    } else if (!chatMode) {
      showMessage(getRandomMessage());
    }
    bubble.classList.add('visible');
  }

  function hideBubble() {
    if (!chatMode) {
      bubble.classList.remove('visible');
    }
  }

  function showLoading() {
    isLoading = true;
    sendBtn.disabled = true;
    inputEl.disabled = true;
    showMessage('<span class="cat-loading">Thinking</span>', true);
  }

  function hideLoading() {
    isLoading = false;
    sendBtn.disabled = false;
    inputEl.disabled = false;
  }

  function showFallbackTip() {
    var tip = getRandomMessage();
    showMessage("😴 *yawns* Here's a tip instead:<br><br>" + tip, true);
  }

  // Send question to AI API
  async function askHijiki(question) {
    if (isLoading || !question.trim()) return;

    chatMode = true;
    showLoading();
    clearTimeout(hideTimeout);

    try {
      var response = await fetch(CAT_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          question: question.trim(),
          site: 'blog',
          context: getPageContext(),
          history: conversationHistory.slice(-MAX_HISTORY)
        })
      });

      var data = await response.json();

      hideLoading();

      // Check for fallback flag or error
      if (data.fallback || data.error || !data.success) {
        showFallbackTip();
        return;
      }

      // Success - show AI response
      var aiResponse = data.response || "Meow? I didn't quite catch that! 😸";

      // Update conversation history
      conversationHistory.push({ role: 'user', content: question.trim() });
      conversationHistory.push({ role: 'model', content: aiResponse });

      // Keep only last MAX_HISTORY messages
      if (conversationHistory.length > MAX_HISTORY) {
        conversationHistory = conversationHistory.slice(-MAX_HISTORY);
      }

      showMessage(aiResponse, true);
      inputEl.value = '';
      inputEl.focus();

    } catch (error) {
      console.error('Hijiki API error:', error);
      hideLoading();
      showFallbackTip();
    }
  }

  // Event handlers
  function handleSend() {
    var question = inputEl.value.trim();
    if (question) {
      askHijiki(question);
    }
  }

  inputEl.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  sendBtn.addEventListener('click', handleSend);

  // Focus input when clicking on bubble (but not on links)
  bubble.addEventListener('click', function(e) {
    if (e.target.tagName !== 'A' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
      inputEl.focus();
    }
  });

  // Hover events
  hoverZone.addEventListener('mouseenter', function() {
    if (!chatMode) {
      showBubble();
    } else {
      clearTimeout(hideTimeout);
      bubble.classList.add('visible');
    }
  });

  hoverZone.addEventListener('mouseleave', function() {
    if (!chatMode) {
      hideTimeout = setTimeout(hideBubble, 1500);
    }
  });

  // Keep bubble alive when hovering over it
  bubble.addEventListener('mouseenter', function() {
    clearTimeout(hideTimeout);
  });

  bubble.addEventListener('mouseleave', function() {
    if (!chatMode) {
      hideTimeout = setTimeout(hideBubble, 1500);
    }
  });

  // Click on cat shows bubble and focuses input
  hoverZone.addEventListener('click', function() {
    chatMode = true;
    showBubble("😸 Ask me anything about the blog!");
    setTimeout(function() { inputEl.focus(); }, 100);
  });

  // Touch support for mobile
  hoverZone.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (bubble.classList.contains('visible') && !chatMode) {
      hideBubble();
    } else {
      chatMode = true;
      showBubble("😸 Ask me anything about the blog!");
      setTimeout(function() { inputEl.focus(); }, 100);
    }
  });

  // Close chat mode when clicking outside
  document.addEventListener('click', function(e) {
    if (chatMode && !bubble.contains(e.target) && !hoverZone.contains(e.target)) {
      chatMode = false;
      conversationHistory = [];
      hideTimeout = setTimeout(hideBubble, 500);
    }
  });

  // Time-based greeting function
  function getTimeBasedGreeting() {
    var hour = new Date().getHours();

    if (hour >= 5 && hour < 12) {
      var morningGreetings = [
        "Good morning! ☀️ Ready to explore some AI articles?",
        "Rise and shine! 🌅 Fresh ideas await you today!",
        "Morning! ☕ Grab your coffee and let's learn something new!"
      ];
      return morningGreetings[Math.floor(Math.random() * morningGreetings.length)];
    } else if (hour >= 12 && hour < 17) {
      var afternoonGreetings = [
        "Good afternoon! 🌤️ Taking a break to read?",
        "Hey there! 😸 Perfect time for some tech exploration!",
        "Afternoon! 🐱 Need a brain snack? Try a blog post!"
      ];
      return afternoonGreetings[Math.floor(Math.random() * afternoonGreetings.length)];
    } else if (hour >= 17 && hour < 21) {
      var eveningGreetings = [
        "Good evening! 🌅 Winding down with some reading?",
        "Evening! 🌆 Great time to dive into something interesting!",
        "Hey! 😺 Relaxing with some AI and tech articles?"
      ];
      return eveningGreetings[Math.floor(Math.random() * eveningGreetings.length)];
    } else {
      var nightGreetings = [
        "Late night browsing? 🌙 I'm a night owl too!",
        "Burning the midnight oil? 🦉 Me too! Let's explore!",
        "Can't sleep? 🌌 Perfect time for some deep reading!",
        "Night owl mode! 🐱‍👤 The best ideas come after dark!"
      ];
      return nightGreetings[Math.floor(Math.random() * nightGreetings.length)];
    }
  }

  // Show initial greeting based on time of day
  setTimeout(function() {
    showBubble(getTimeBasedGreeting());
    setTimeout(hideBubble, 5000);
  }, 1000);
})();
</script>
